name: Architecture Guardrails

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Prepare env asset for CI
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi

      - name: Run architecture guardrails
        run: dart run tool/architecture_guardrails.dart

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
